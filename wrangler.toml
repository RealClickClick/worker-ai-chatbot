name = "ai-telegram-bot"
main = "src/index.ts"
compatibility_date = "2026-06-24"
compatibility_flags = ["streams_enable_constructors"]

# D1 Database for chat history and user settings
[[d1_databases]]
binding = "DB"
database_name = "ai-telegram-bot-db"
database_id = "your-d1-database-id-here"

# AI binding for Cloudflare Workers AI
[ai]
binding = "AI"

# Public environment variables (can be in wrangler.toml)
[vars]
WORKER_DOMAIN = "your-worker.your-subdomain.workers.dev"
ADMIN_IDS = "your-telegram-user-id-here"

# Set these via `npx wrangler secret put <NAME>`:
#   TELEGRAM_BOT_TOKEN  — Bot token from @BotFather (required)
#   BRAVE_API_KEY       — API key for /search via Brave Search (optional)
#   WEBHOOK_SECRET      — Secret token for webhook verification (recommended)
#   BOT_USERNAME        — Bot username WITHOUT @ (e.g. "MyBot") for group mention detection

# Cron triggers:
#   0 7 * * *    — Daily tips (7:00 AM UTC)
#   */1 * * * * — Process due reminders (every minute)
[triggers]
crons = ["0 7 * * *", "*/1 * * * *"]
